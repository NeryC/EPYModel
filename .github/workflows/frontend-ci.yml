name: Frontend CI

on:
  pull_request:
    paths: ['**', '!docs/**']
  push:
    branches: [main]
    paths: ['**', '!docs/**']

jobs:
  quality:
    name: Lint, Build, Unit + Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint (zero warnings)
        # ESLint 9 + eslint-config-next 16 crash on FlatCompat with circular-JSON error.
        # See docs/TEST_METRICS.md "Known issues". Mark non-blocking until upstream fix lands.
        run: yarn lint --max-warnings=0
        continue-on-error: true

      - name: Build (type-check + production bundle)
        run: yarn build

      - name: Unit tests
        run: yarn test:unit

      - name: Coverage
        run: yarn test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 30

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn playwright install --with-deps chromium firefox webkit
      - run: yarn test:e2e
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  mutation:
    name: Mutation testing (main only)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
      - run: yarn install --frozen-lockfile
      - run: yarn test:mutation
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-mutation-report
          path: reports/mutation/
          retention-days: 30
